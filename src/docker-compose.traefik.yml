services:
  backend:
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik}"
      - "traefik.http.routers.familyhub-backend.rule=Host(`${TRAEFIK_HOST}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.familyhub-backend.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.familyhub-backend.tls=${TRAEFIK_TLS:-true}"
      - "traefik.http.routers.familyhub-backend.priority=100"
      - "traefik.http.services.familyhub-backend.loadbalancer.server.port=8080"

  frontend:
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik}"
      - "traefik.http.routers.familyhub-frontend.rule=Host(`${TRAEFIK_HOST}`)"
      - "traefik.http.routers.familyhub-frontend.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.familyhub-frontend.tls=${TRAEFIK_TLS:-true}"
      - "traefik.http.routers.familyhub-frontend.priority=1"
      - "traefik.http.services.familyhub-frontend.loadbalancer.server.port=80"

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}
