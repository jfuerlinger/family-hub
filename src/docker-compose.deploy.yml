# Docker Compose Deployment-Konfiguration für Family Hub
#
# Verwendet vorgefertigte Images von DockerHub.
# Vor dem ersten Start: .env.deploy.example nach .env.deploy kopieren und befüllen
#
# Starten:
#   docker compose -f docker-compose.deploy.yml --env-file .env.deploy up -d
#
# Stoppen:
#   docker compose -f docker-compose.deploy.yml --env-file .env.deploy down

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Bitte POSTGRES_PASSWORD in .env.deploy setzen}
      POSTGRES_DB: ${POSTGRES_DB:-familyhubdb}
    volumes:
      - familyhub-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${DOCKERHUB_USERNAME:?Bitte DOCKERHUB_USERNAME in .env.deploy setzen}/familyhub-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=${POSTGRES_DB:-familyhubdb};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    image: ${DOCKERHUB_USERNAME:?Bitte DOCKERHUB_USERNAME in .env.deploy setzen}/familyhub-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      BACKEND_URL: ${FRONTEND_BACKEND_URL:-http://backend:8080}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-4173}:80"

volumes:
  familyhub-postgres-data:
